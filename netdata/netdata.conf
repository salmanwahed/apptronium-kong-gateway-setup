# Low-resource tuning for a single, RAM-constrained VPS.
# Unknown keys are ignored with a warning, so this stays forward-compatible.
# Reference: https://learn.netdata.cloud/docs/netdata-agent/configuration

[global]
    # Collect every 2s instead of per-second — cuts CPU and memory churn.
    update every = 2

[db]
    mode = dbengine
    # One storage tier instead of the default three (less RAM + disk).
    storage tiers = 1
    # Cap the RAM held for recent metric pages.
    dbengine page cache size MB = 32
    # Cap on-disk history; a few days at 2s resolution is plenty for one box.
    dbengine tier 0 disk space MB = 256

[ml]
    # Anomaly-detection ML is the biggest RAM/CPU consumer — off on a tight box.
    enabled = no

[health]
    # Keep health alarms + notifications on.
    enabled = yes

[plugins]
    # eBPF can use significant memory; not needed for basic host/container stats.
    ebpf = no
