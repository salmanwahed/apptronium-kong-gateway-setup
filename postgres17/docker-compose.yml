services:
  postgres:
    image: postgres:17-bookworm
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - apptronium_net

volumes:
  postgres_data:

networks:
  apptronium_net:
    external: true
