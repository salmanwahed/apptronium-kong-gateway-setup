# Block 1: Redirect all HTTP traffic to HTTPS
# Add new service subdomains here as they are provisioned
server {
    listen 80;
    server_name apptronium.com www.apptronium.com ratesageai.apptronium.com jenkins.apptronium.com;

    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# Block 2: Main site — proxied to Grav CMS container
server {
    listen 443 ssl;
    http2 on;
    server_name apptronium.com www.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com/privkey.pem;

    if ($host = www.apptronium.com) {
        return 301 https://apptronium.com$request_uri;
    }

    location / {
        resolver 127.0.0.11 valid=10s;
        set $apptronium_upstream http://apptronium:80;

        proxy_pass $apptronium_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 64m;
        proxy_read_timeout   120s;
    }
}


# Block 3: Jenkins — proxied directly, Kong is not in the path
server {
    listen 443 ssl;
    http2 on;
    server_name jenkins.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com/privkey.pem;

    location / {
        # Resolve at request time so Nginx starts even if Jenkins is down
        resolver 127.0.0.11 valid=10s;
        set $jenkins_upstream http://jenkins:8080;

        proxy_pass $jenkins_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}


# Block 4: API services — all routed through Kong by Host header
# To add a new service: add its subdomain to server_name, expand the cert,
# and add a service+route entry in kong/kong.yaml, then run: deck sync -s kong/kong.yaml
server {
    listen 443 ssl;
    http2 on;
    server_name ratesageai.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com/privkey.pem;

    location / {
        # Resolve at request time so Nginx starts even if Kong is down
        resolver 127.0.0.11 valid=10s;
        set $kong_upstream http://kong:8000;

        proxy_pass $kong_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
