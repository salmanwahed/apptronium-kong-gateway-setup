# Block 1: Redirect all HTTP traffic to HTTPS
# Add new service subdomains here as they are provisioned
server {
    listen 80;
    server_name apptronium.com www.apptronium.com ratesageai.apptronium.com jenkins.apptronium.com netdata.apptronium.com;

    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# Block 2: Main site — proxied to Grav CMS container
server {
    listen 443 ssl;
    http2 on;
    server_name apptronium.com www.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com/privkey.pem;

    if ($host = www.apptronium.com) {
        return 301 https://apptronium.com$request_uri;
    }

    location / {
        resolver 127.0.0.11 valid=10s;
        set $apptronium_upstream http://apptronium:80;

        proxy_pass $apptronium_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 64m;
        proxy_read_timeout   120s;
    }
}


# Block 3: Jenkins decommissioned — redirect to the main site.
# Uses a 302 (temporary) so browsers don't cache it permanently, in case
# Jenkins is ever restored at this subdomain.
server {
    listen 443 ssl;
    http2 on;
    server_name jenkins.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com/privkey.pem;

    return 302 https://apptronium.com;
}


# Block 4: API services — all routed through Kong by Host header
# To add a new service: add its subdomain to server_name, expand the cert,
# and add a service+route entry in kong/kong.yaml, then run: deck sync -s kong/kong.yaml
server {
    listen 443 ssl;
    http2 on;
    server_name ratesageai.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com-0001/privkey.pem;

    location / {
        # Resolve at request time so Nginx starts even if Kong is down
        resolver 127.0.0.11 valid=10s;
        set $kong_upstream http://kong:8000;

        proxy_pass $kong_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# Block 5: Netdata monitoring — internal agent, gated by HTTP basic-auth.
# The Netdata dashboard has no built-in login, so Nginx enforces the password.
# Create the password file with:
#   printf "admin:$(openssl passwd -apr1)\n" > nginx/conf.d/.htpasswd
server {
    listen 443 ssl;
    http2 on;
    server_name netdata.apptronium.com;

    ssl_certificate /etc/letsencrypt/live/apptronium.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apptronium.com-0001/privkey.pem;

    auth_basic           "Netdata";
    auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

    location / {
        # Resolve at request time so Nginx starts even if Netdata is down
        resolver 127.0.0.11 valid=10s;
        set $netdata_upstream http://netdata:19999;

        proxy_pass $netdata_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Netdata's live charts stream over WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
