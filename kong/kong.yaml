_format_version: "3.0"

plugins:
  - name: key-auth
    config:
      key_names:
        - apikey

services:
  - name: ratesageai
    url: http://ratesageai_api:8010
    routes:
      - name: ratesageai-route
        hosts:
          - ratesageai.apptronium.com

consumers:
  - username: ratesageai-app
    keyauth_credentials:
      - key: REPLACE_WITH_STRONG_API_KEY
